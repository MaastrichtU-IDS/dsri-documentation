---
kind: Template
apiVersion: template.openshift.io/v1
metadata:
  name: jupyterlab-knowledge-graph
  annotations:
    openshift.io/display-name: JupyterLab Knowledge Graph
    description: |-
      Start JupyterLab images based on the official Docker stack, as the `jovyan` user, with sudo privileges and knowledge graph tools installed.

      Checkout https://github.com/MaastrichtU-IDS/jupyterlab to see how our custom image is built, and how to extend it
      For more details on the jupyter docker stack, go to https://github.com/jupyter/docker-stacks

      📂 Use the persistent folder in the workspace of the JupyterLab UI (usually /home/jovyan/work/persistent folder) to store your data in the persistent storage automatically created
      You can find the persistent storage in the DSRI web UI, go to Search > Resources > Persistent Volume Claim.

      🗑️ Use this command with your application name to delete completely your application and its persistent volumes:
      oc delete all,pvc,secret,configmaps,serviceaccount,rolebinding --selector app=$APPLICATION_NAME
    iconClass: icon-python
    tags: python,jupyter,notebook,knowledge,graph,knowledgegraph
    openshift.io/provider-display-name: Research Computing Support, UM
    openshift.io/documentation-url: https://maastrichtu-ids.github.io/dsri-documentation/docs/deploy-jupyter
    openshift.io/support-url: https://maastrichtu-ids.github.io/dsri-documentation/help
labels:
  template: jupyterlab-knowledge-graph

parameters:
  - name: APPLICATION_NAME
    displayName: Name for the application
    description: Must be without spaces (use -), and unique in the project.
    value: jupyterlab-knowledge-graph
    required: true
  - name: APPLICATION_IMAGE
    displayName: Jupyter notebook Docker image
    description: Check the description on the right for more details about available images
    value: ghcr.io/maastrichtu-ids/jupyterlab:knowledge-graph
    required: true
  - name: STORAGE_SIZE
    displayName: Storage size
    description: Size of the storage allocated to the notebook persistent storage.
    value: 5Gi
    required: true
  - name: PASSWORD
    displayName: JupyterLab UI Password
    description: The password/token to access the JupyterLab web UI
    required: true

objects:
  - kind: ImageStream
    apiVersion: image.openshift.io/v1
    metadata:
      name: "${APPLICATION_NAME}"
      labels:
        app: "${APPLICATION_NAME}"
        template: jupyterlab-knowledge-graph
    spec:
      lookupPolicy:
        local: true
      tags:
        - name: latest
          from:
            kind: DockerImage
            name: ${APPLICATION_IMAGE}
          importPolicy:
            scheduled: false

  - kind: PersistentVolumeClaim
    apiVersion: v1
    metadata:
      name: "${APPLICATION_NAME}"
      labels:
        app: "${APPLICATION_NAME}"
        template: jupyterlab-knowledge-graph
    spec:
      accessModes:
        - ReadWriteMany
      resources:
        requests:
          storage: ${STORAGE_SIZE}
      storageClassName: ocs-storagecluster-cephfs

  - kind: Service
    apiVersion: v1
    metadata:
      name: "${APPLICATION_NAME}"
      labels:
        app: "${APPLICATION_NAME}"
        template: jupyterlab-knowledge-graph
    spec:
      selector:
        app: "${APPLICATION_NAME}"
      ports:
        - name: "8888-tcp"
          protocol: TCP
          port: 8888
          targetPort: 8888
      type: ClusterIP

  - kind: Route
    apiVersion: route.openshift.io/v1
    metadata:
      name: "${APPLICATION_NAME}"
      labels:
        app: "${APPLICATION_NAME}"
        template: jupyterlab-knowledge-graph
    spec:
      to:
        kind: Service
        name: "${APPLICATION_NAME}"
      port:
        targetPort: "8888-tcp"
      tls:
        termination: edge
        insecureEdgeTerminationPolicy: Redirect

  - kind: Secret
    apiVersion: v1
    metadata:
      name: "${APPLICATION_NAME}"
      labels:
        app: "${APPLICATION_NAME}"
        template: jupyterlab-knowledge-graph
    stringData:
      application-password: "${PASSWORD}"

  - kind: Deployment
    apiVersion: apps/v1
    metadata:
      name: "${APPLICATION_NAME}"
      labels:
        app: "${APPLICATION_NAME}"
        template: jupyterlab-knowledge-graph
    spec:
      replicas: 1
      strategy:
        type: Recreate
      selector:
        matchLabels:
          app: "${APPLICATION_NAME}"
      template:
        metadata:
          annotations:
            io.kubernetes.cri-o.TrySkipVolumeSELinuxLabel: 'true'
          labels:
            app: "${APPLICATION_NAME}"
            deployment: "${APPLICATION_NAME}"
        spec:
          runtimeClassName: selinux
          serviceAccountName: "anyuid"
          automountServiceAccountToken: false
          securityContext:
            runAsUser: 0
            fsGroup: 100
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: "${APPLICATION_NAME}"
          containers:
            - name: "${APPLICATION_NAME}"
              image: "${APPLICATION_IMAGE}"
              imagePullPolicy: IfNotPresent
              workingDir: /home/jovyan/work
              ports:
                - containerPort: 8888
                  protocol: TCP
              volumeMounts:
                - name: data
                  mountPath: /home/jovyan/work/persistent
              env:
                - name: JUPYTER_TOKEN
                  valueFrom:
                    secretKeyRef:
                      key: application-password
                      name: "${APPLICATION_NAME}"
                - name: JUPYTER_ENABLE_LAB
                  value: "yes"
                - name: GRANT_SUDO
                  value: "yes"
              readinessProbe:
                tcpSocket:
                  port: 8888
              livenessProbe:
                initialDelaySeconds: 15
                tcpSocket:
                  port: 8888
                failureThreshold: 40
                periodSeconds: 10
                timeoutSeconds: 2
              resources:
                requests:
                  cpu: '2'
                  memory: 4Gi
                limits:
                  cpu: '32'
                  memory: 200Gi
