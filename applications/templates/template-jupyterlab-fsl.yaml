---
kind: Template
apiVersion: template.openshift.io/v1
metadata:
  name: fsl-jupyterlab
  annotations:
    openshift.io/display-name: FSL with JupyterLab
    description: |-
      FSL (FMRIB Software Library) 6.0.7 pre-loaded in a JupyterLab workspace. 
      This image is optimized for fMRI preprocessing workflows and includes full Python integration for neuroimaging research.
     
      **Note:** This image is for Command Line (CLI) use only. It does not support Graphical Interfaces (GUIs). For visual tools, use the "Ubuntu VNC fMRI" template.
     
      **Features:**
      - FSL 6.0.7 
      - JupyterLab with Python 3.12

      **Persistence:**
      Use the `/home/jovyan/work/persistent` folder to store your data.
      Any data stored outside this folder will be lost when the pod restarts.

    iconClass: icon-python
    tags: neuro,fsl,fmri,jupyter,notebook
    openshift.io/provider-display-name: Research Computing Support, UM
    openshift.io/documentation-url: https://fsl.fmrib.ox.ac.uk/fsl/docs/install/container.html
labels:
  template: fsl-jupyterlab

parameters:
  - name: APPLICATION_NAME
    displayName: Application Name
    description: Must be unique in the project (e.g., fsl-researcher-name).
    value: fsl-jupyter
    required: true
  - name: APPLICATION_IMAGE
    displayName: FSL Docker Image
    description: The Docker image for the FSL workspace. Defaults to the FSL 6.0.7 image with JupyterLab pre-installed.
    value: ghcr.io/maastrichtu-library/fsl:dev
    required: true
  - name: STORAGE_SIZE
    displayName: Storage Size
    description: Size of the storage allocated for fMRI data (e.g., 10Gi, 50Gi).
    value: 10Gi
    required: true
  - name: PASSWORD
    displayName: JupyterLab Password
    description: The password/token to access the JupyterLab web UI.
    required: true

objects:
  - kind: ImageStream
    apiVersion: image.openshift.io/v1
    metadata:
      name: "${APPLICATION_NAME}"
      labels:
        app: "${APPLICATION_NAME}"
    spec:
      lookupPolicy:
        local: true
      tags:
        - name: latest
          from:
            kind: DockerImage
            name: ${APPLICATION_IMAGE}
          importPolicy:
            scheduled: false

  - kind: PersistentVolumeClaim
    apiVersion: v1
    metadata:
      name: "${APPLICATION_NAME}"
      labels:
        app: "${APPLICATION_NAME}"
    spec:
      accessModes:
        - ReadWriteMany
      resources:
        requests:
          storage: ${STORAGE_SIZE}
      storageClassName: ocs-storagecluster-cephfs

  - kind: Service
    apiVersion: v1
    metadata:
      name: "${APPLICATION_NAME}"
      labels:
        app: "${APPLICATION_NAME}"
    spec:
      selector:
        app: "${APPLICATION_NAME}"
      ports:
        - name: "8888-tcp"
          protocol: TCP
          port: 8888
          targetPort: 8888
      type: ClusterIP

  - kind: Route
    apiVersion: route.openshift.io/v1
    metadata:
      name: "${APPLICATION_NAME}"
      labels:
        app: "${APPLICATION_NAME}"
    spec:
      to:
        kind: Service
        name: "${APPLICATION_NAME}"
      port:
        targetPort: "8888-tcp"
      tls:
        termination: edge
        insecureEdgeTerminationPolicy: Redirect

  - kind: Secret
    apiVersion: v1
    metadata:
      name: "${APPLICATION_NAME}"
      labels:
        app: "${APPLICATION_NAME}"
    stringData:
      application-password: "${PASSWORD}"

  - kind: Deployment
    apiVersion: apps/v1
    metadata:
      name: "${APPLICATION_NAME}"
      labels:
        app: "${APPLICATION_NAME}"
    spec:
      replicas: 1
      strategy:
        type: Recreate
      selector:
        matchLabels:
          app: "${APPLICATION_NAME}"
      template:
        metadata:
          annotations:
            io.kubernetes.cri-o.TrySkipVolumeSELinuxLabel: 'true'
          labels:
            app: "${APPLICATION_NAME}"
            deployment: "${APPLICATION_NAME}"
        spec:
          serviceAccountName: "anyuid"
          automountServiceAccountToken: false
          securityContext:
            runAsUser: 0
            supplementalGroups:
            - 100
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: "${APPLICATION_NAME}"
          containers:
            - name: "${APPLICATION_NAME}"
              image: "${APPLICATION_IMAGE}"
              imagePullPolicy: IfNotPresent
              workingDir: /home/jovyan/work
              ports:
                - containerPort: 8888
                  protocol: TCP
              volumeMounts:
                - name: data
                  mountPath: /home/jovyan/work/persistent
              env:
                - name: JUPYTER_TOKEN
                  valueFrom:
                    secretKeyRef:
                      key: application-password
                      name: "${APPLICATION_NAME}"
                - name: JUPYTER_ENABLE_LAB
                  value: "yes"
                - name: FSLDIR
                  value: "/usr/local/fsl"
              resources:
                requests:
                  cpu: 500m
                  memory: 2Gi
                limits:
                  cpu: '8'
                  memory: 16Gi